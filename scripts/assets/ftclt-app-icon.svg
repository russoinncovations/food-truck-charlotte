<?xml version="1.0" encoding="UTF-8"?>
<!--
  Canonical raster art (red tile, white CLT food truck): ftclt-app-icon.png — 1024×1024 master.
  PWA builds use `npm run generate:pwa-icons`, which rasterizes from the PNG directly.
  This SVG references the PNG for previews and tooling; keep both files together.
-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="FoodTruckCLT app icon — CLT truck on red rounded tile">
  <title>FoodTruckCLT</title>
  <image width="1024" height="1024" preserveAspectRatio="xMidYMid meet" xlink:href="ftclt-app-icon.png" href="ftclt-app-icon.png" />
</svg>
